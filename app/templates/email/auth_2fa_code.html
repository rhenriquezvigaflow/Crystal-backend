<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Small Lagoons Authentication Code</title>
  </head>
  <body style="margin:0;padding:0;background:#f3f6f9;font-family:Arial,Helvetica,sans-serif;color:#172033;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f3f6f9;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border:1px solid #dbe3ea;border-radius:8px;overflow:hidden;">
            <tr>
              <td style="padding:22px 24px;background:#0f5f8f;color:#ffffff;">
                <h1 style="margin:0;font-size:20px;line-height:1.3;">Small Lagoons Authentication Code</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:26px 24px;">
                <p style="margin:0 0 16px;font-size:15px;line-height:1.5;">
                  Enter the following 4-digit code to complete your Small Lagoons sign-in.
                </p>
                <div style="margin:22px 0;padding:18px 20px;text-align:center;border:1px solid #c7d6e2;border-radius:8px;background:#f8fbfd;">
                  <span style="font-size:34px;line-height:1;font-weight:700;letter-spacing:8px;color:#102a43;">
                    {{ code }}
                  </span>
                </div>
                <p style="margin:0 0 10px;font-size:14px;line-height:1.5;color:#405261;">
                  This code expires in {{ expires_minutes }} minutes and can only be used once.
                </p>
                <p style="margin:0;font-size:13px;line-height:1.5;color:#687887;">
                  If you did not request this access, ignore this email and contact your administrator.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
